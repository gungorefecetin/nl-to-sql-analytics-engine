spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/querymind
    username: querymind_admin
    password: ${POSTGRES_PASSWORD:querymind_secret}
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

readonly:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/querymind
    username: querymind_readonly
    password: ${READONLY_PASSWORD:readonly_secret}
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o}
  max-tokens: ${OPENAI_MAX_TOKENS:1000}
  temperature: ${OPENAI_TEMPERATURE:0.1}

querymind:
  max-execution-time-seconds: ${MAX_QUERY_EXECUTION_TIME_SECONDS:30}

server:
  port: 8080
