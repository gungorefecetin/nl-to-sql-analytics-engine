spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/querymind
    username: querymind_admin
    password: ${POSTGRES_PASSWORD:querymind_secret_2026}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

readonly:
  datasource:
    url: jdbc:postgresql://localhost:5432/querymind
    username: querymind_readonly
    password: ${READONLY_PASSWORD:readonly_pass_2026}

openai:
  api-key: ${OPENAI_API_KEY:sk-placeholder}
  model: gpt-4o
  max-tokens: 1000
  temperature: 0.1

querymind:
  max-execution-time-seconds: ${MAX_QUERY_EXECUTION_TIME_SECONDS:30}
  max-result-rows: ${MAX_RESULT_ROWS:500}
  rate-limit: ${RATE_LIMIT_REQUESTS_PER_MINUTE:20}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080
