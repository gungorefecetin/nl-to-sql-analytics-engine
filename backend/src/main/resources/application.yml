spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/querymind
    username: querymind_admin
    password: ${POSTGRES_PASSWORD:querymind_secret}
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

readonly:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/querymind
    username: querymind_readonly
    password: ${READONLY_PASSWORD:readonly_secret}
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

server:
  port: 8080
